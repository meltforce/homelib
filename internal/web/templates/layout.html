{{define "layout"}}<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>homelib — {{.Title}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root { --pico-font-size: 15px; }
    nav ul li a.active { font-weight: bold; text-decoration: underline; }
    .badge { display: inline-block; padding: 0.15em 0.5em; border-radius: 4px; font-size: 0.8em; }
    .badge-green { background: var(--pico-color-green-550); color: white; }
    .badge-red { background: var(--pico-color-red-550); color: white; }
    .badge-grey { background: var(--pico-color-grey-500); color: white; }
    .badge-yellow { background: var(--pico-color-yellow-500); color: black; }
    .stat-card { text-align: center; }
    .stat-card h2 { margin-bottom: 0; font-size: 2.5em; }
    .stat-card small { color: var(--pico-muted-color); }
    table { font-size: 0.9em; }
    th[data-sortable] { cursor: pointer; user-select: none; }
    th .sort-indicator { font-size: 0.7em; margin-left: 0.3em; }
    .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <nav class="container-fluid">
    <ul>
      <li><strong>homelib</strong></li>
    </ul>
    <ul>
      <li><a href="/" {{if eq .Active "dashboard"}}class="active"{{end}}>Dashboard</a></li>
      <li><a href="/hosts" {{if eq .Active "hosts"}}class="active"{{end}}>Hosts</a></li>
      <li><a href="/services" {{if eq .Active "services"}}class="active"{{end}}>Services</a></li>
      <li><a href="/networks" {{if eq .Active "networks"}}class="active"{{end}}>Networks</a></li>
      <li><a href="/tailscale" {{if eq .Active "tailscale"}}class="active"{{end}}>Tailscale</a></li>
      <li><a href="/collections" {{if eq .Active "collections"}}class="active"{{end}}>Collections</a></li>
    </ul>
  </nav>
  <main class="container">
    {{template "content" .}}
  </main>
  <footer class="container">
    <small>homelib — Homelab Inventory Service</small>
  </footer>
  <script>
  function initSortable() {
    document.querySelectorAll('table thead th').forEach(function(th) {
      if (th.hasAttribute('data-sortable')) return;
      th.setAttribute('data-sortable', '');
      var indicator = document.createElement('span');
      indicator.className = 'sort-indicator';
      th.appendChild(indicator);
      th.addEventListener('click', function() {
        var table = th.closest('table');
        var tbody = table.querySelector('tbody');
        var idx = Array.from(th.parentNode.children).indexOf(th);
        var asc = th.dataset.sortDir !== 'asc';
        th.parentNode.querySelectorAll('th').forEach(function(h) {
          h.dataset.sortDir = '';
          h.querySelector('.sort-indicator').textContent = '';
        });
        th.dataset.sortDir = asc ? 'asc' : 'desc';
        indicator.textContent = asc ? ' \u25B2' : ' \u25BC';
        var rows = Array.from(tbody.querySelectorAll('tr'));
        rows.sort(function(a, b) {
          var cellA = a.children[idx], cellB = b.children[idx];
          if (!cellA || !cellB) return 0;
          var va = (cellA.querySelector('.badge') || cellA).textContent.trim();
          var vb = (cellB.querySelector('.badge') || cellB).textContent.trim();
          var na = parseFloat(va), nb = parseFloat(vb);
          if (!isNaN(na) && !isNaN(nb)) return asc ? na - nb : nb - na;
          return asc ? va.localeCompare(vb) : vb.localeCompare(va);
        });
        rows.forEach(function(r) { tbody.appendChild(r); });
      });
    });
  }
  initSortable();
  document.body.addEventListener('htmx:afterSwap', initSortable);
  </script>
</body>
</html>{{end}}
