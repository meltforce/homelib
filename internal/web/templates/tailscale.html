{{define "content"}}
<h1>Tailscale ACL Dataflows</h1>

{{if .Dataflows}}
<form id="tailscale-filters">
  <div class="grid">
    <input type="search" name="q" placeholder="Search dataflows..." value="{{.Filter.Search}}"
      hx-get="/tailscale" hx-target="#tailscale-table" hx-swap="innerHTML" hx-push-url="true"
      hx-trigger="input changed delay:300ms" hx-include="#tailscale-filters">
    <select name="type"
      hx-get="/tailscale" hx-target="#tailscale-table" hx-swap="innerHTML" hx-push-url="true"
      hx-trigger="change" hx-include="#tailscale-filters">
      <option value="">All Types</option>
      {{range .Types}}
      <option value="{{.}}" {{if eq . $.Filter.Type}}selected{{end}}>{{.}}</option>
      {{end}}
    </select>
  </div>
</form>

<div id="tailscale-table">
{{template "tailscale_table" .}}
</div>
{{else}}
<p>No ACL data available. The Tailscale Control Plane API collector may not be configured.</p>
{{end}}
{{end}}
