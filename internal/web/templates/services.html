{{define "content"}}
<h1>Services</h1>
<table>
  <thead><tr><th>Host</th><th>Stack</th><th>Service</th><th>Container</th><th>State</th><th>Image</th></tr></thead>
  <tbody>
  {{range .Services}}
    <tr>
      <td><a href="/hosts/{{.HostName}}">{{.HostName}}</a></td>
      <td>{{.StackName}}</td>
      <td>{{.ServiceName}}</td>
      <td>{{.ContainerName}}</td>
      <td>{{if .Status}}<span class="badge badge-{{if eq .Status "running"}}green{{else if or (eq .Status "stopped") (eq .Status "exited") (eq .Status "dead")}}red{{else}}grey{{end}}">{{.Status}}</span>{{end}}</td>
      <td>{{.Image}}</td>
    </tr>
  {{else}}
    <tr><td colspan="6">No services found.</td></tr>
  {{end}}
  </tbody>
</table>
{{end}}
