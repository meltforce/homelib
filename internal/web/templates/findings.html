{{define "content"}}
<h1>Findings</h1>
<table>
  <thead><tr><th>Severity</th><th>Source</th><th>Type</th><th>Host</th><th>Message</th></tr></thead>
  <tbody>
  {{range .Findings}}
    <tr>
      <td><span class="badge badge-{{if eq .Severity "error"}}red{{else if eq .Severity "warning"}}yellow{{else}}grey{{end}}">{{.Severity}}</span></td>
      <td>{{.Source}}</td>
      <td>{{.FindingType}}</td>
      <td>{{if .HostName}}<a href="/hosts/{{.HostName}}">{{.HostName}}</a>{{end}}</td>
      <td>{{.Message}}</td>
    </tr>
  {{else}}
    <tr><td colspan="5">No findings.</td></tr>
  {{end}}
  </tbody>
</table>
{{end}}
