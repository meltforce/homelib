service:
  hostname: homelib              # tsnet hostname (homelib.your-tailnet.ts.net)
  state_dir: /data/tsnet         # tsnet state directory
  data_dir: /data                # SQLite database location
  log_level: info                # info or debug

schedule:
  cron: "0 6,18 * * *"          # Collection schedule (2x daily)
  retention_days: 30             # Keep old runs for N days

# Secret backend: "setec" uses Tailscale's secret manager (requires tsnet).
# Omit or leave type empty to use the legacy op:// behavior.
secret_backend:
  type: setec
  setec_url: https://setec.your-tailnet.ts.net

# Secrets: resolution order depends on backend:
#   1. Environment variable HOMELIB_<UPPER_KEY>
#   2. setec store (if secret_backend.type is "setec" — values are setec secret names)
#   3. op:// via OP_SERVICE_ACCOUNT_TOKEN (if value starts with op://)
#   4. Literal value in config
#
# With setec backend (shown below), values are setec secret names.
# With op:// backend, use 1Password references like "op://Vault/item/field".
secrets:
  hetzner_api_token: "homelib/hetzner-api-token"
  komodo_api_key: "homelib/komodo-api-key"
  komodo_api_secret: "homelib/komodo-api-secret"
  unifi_username: "homelib/unifi-username"
  unifi_password: "homelib/unifi-password"
  ts_auth_key: "homelib/ts-auth-key"
  ts_api_key: "homelib/ts-api-key"

collectors:
  proxmox:
    enabled: true
    host: pve-host               # Tailscale hostname of Proxmox node (SSH via Tailscale)
    user: root
  tailscale:
    enabled: true                # Always active (tsnet basis)
    control_plane:
      enabled: true              # ACLs, DNS, Routes, Keys (needs ts_api_key)
  hetzner:
    enabled: true
  komodo:
    enabled: true
    base_url: https://komodo.your-tailnet.ts.net
  unifi:
    enabled: true
    base_url: https://unifi-controller
    site: default
    include_clients: false

plugins:
  - name: pve-resources
    enabled: false               # Capacity is computed natively from Proxmox host data
    description: "Proxmox capacity planning & resource overview"
    type: ssh
    host: pve-host
    user: root
    command: /usr/local/bin/pve-resources --json
    timeout: 30s
    schedule: default

  - name: pve-efficiency
    enabled: false
    description: "RAM efficiency analysis & right-sizing"
    type: ssh
    host: pve-host
    user: root
    command: /usr/local/bin/pve-efficiency --json
    timeout: 30s
    schedule: default

# Roles: enrich hosts with infrastructure roles and application categories.
# These are optional — hosts will still be collected without role definitions.
roles:
  proxmox_nodes:
    pve-host:
      infrastructure_role: hypervisor
      workload_specialization: general
      description: "Primary Proxmox host"

  application_categories:
    homeassistant: automation
    jellyfin: media-server
    caddy: reverse-proxy
    paperless: documents
    vaultwarden: security
    gitea: development
    immich: photos

  guest_overrides:
    # Use when hostname differs from application name:
    # my-vm: homeassistant

  tailscale_devices:
    # Enrich Tailscale devices with role/application metadata:
    # my-nas:
    #   role: fileserver
    #   application: truenas
    #   description: "TrueNAS SCALE fileserver"
