service:
  hostname: homelib              # tsnet hostname (homelib.tailnet-name.ts.net)
  state_dir: /data/tsnet         # tsnet state directory
  data_dir: /data                # SQLite database location
  log_level: info                # info or debug

schedule:
  cron: "0 6,18 * * *"          # Collection schedule (2x daily)
  retention_days: 30             # Keep old runs for N days

# Secrets: op:// reference, environment variable, or literal value
# Resolution order:
#   1. Environment variable HOMELIB_<UPPER_KEY>
#   2. op:// via OP_SERVICE_ACCOUNT_TOKEN
#   3. Literal value in config
secrets:
  hetzner_api_token: "op://Homelab/hetzner-api/credential"
  komodo_api_key: "op://Homelab/komodo-api/Benutzername"
  komodo_api_secret: "op://Homelab/komodo-api/Anmeldedaten"
  unifi_username: "op://Homelab/unifipoller/username"
  unifi_password: "op://Homelab/unifipoller/password"
  ts_auth_key: "op://Homelab/homelib-ts/credential"
  ts_api_key: "op://Homelab/tailscale-api/credential"

collectors:
  proxmox:
    enabled: true
    host: dude                   # Tailscale hostname (SSH via Tailscale)
    user: root
  tailscale:
    enabled: true                # Always active (tsnet basis)
    control_plane:
      enabled: true              # ACLs, DNS, Routes, Keys (needs ts_api_key)
  hetzner:
    enabled: true
  komodo:
    enabled: true
    base_url: https://komodo.leo-royal.ts.net
  unifi:
    enabled: true
    base_url: https://maude
    site: default
    include_clients: false

plugins:
  - name: pve-resources
    enabled: true
    description: "Proxmox capacity planning & resource overview"
    type: ssh
    host: dude
    user: root
    command: /usr/local/bin/pve-resources --json
    timeout: 30s
    schedule: default

  - name: pve-efficiency
    enabled: false               # Enable when --json is implemented
    description: "RAM efficiency analysis & right-sizing"
    type: ssh
    host: dude
    user: root
    command: /usr/local/bin/pve-efficiency --json
    timeout: 30s
    schedule: default

roles:
  proxmox_nodes:
    dude:
      infrastructure_role: hypervisor
      workload_specialization: general
      description: "Primary Proxmox host"
    donny:
      infrastructure_role: hypervisor
      workload_specialization: home-automation
      description: "Secondary Proxmox host"

  application_categories:
    homeassistant: automation
    jellyfin: media-server
    caddy: reverse-proxy
    komodo: management
    paperless: documents
    vaultwarden: security
    gitea: development
    immich: photos

  guest_overrides:
    brandt: homeassistant        # hostname != application name

  tailscale_devices:
    lebowski:
      role: fileserver
      application: truenas
      description: "TrueNAS SCALE fileserver"
    maude:
      role: gateway
      application: unifi
      description: "UniFi Dream Machine"
